server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's internal DNS resolver so Nginx looks up "api" at
    # request time rather than at startup — prevents crash if api
    # container isn't ready when frontend starts.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # SSE: disable buffering so tokens reach the browser instantly
    location /query {
        set $upstream http://api:8000;
        proxy_pass         $upstream;
        proxy_http_version 1.1;
        proxy_set_header   Connection '';
        proxy_buffering    off;
        proxy_cache        off;
        chunked_transfer_encoding on;
    }

    location /api/ {
        set $upstream http://api:8000;
        proxy_pass $upstream/;
    }

    # Proxy all other API calls (ingest, metrics, health, docs)
    location ~ ^/(ingest|metrics|health|docs|openapi) {
        set $upstream http://api:8000;
        proxy_pass $upstream;
        proxy_set_header Host $host;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}