server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;

    # SSE: disable buffering so tokens reach the browser instantly
    location /query {
        proxy_pass         http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header   Connection '';
        proxy_buffering    off;
        proxy_cache        off;
        chunked_transfer_encoding on;
    }

    location /api/ {
        proxy_pass http://api:8000/;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
