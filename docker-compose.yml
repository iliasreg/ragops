# RAG-Ops Observability Agent — Docker Compose
version: "3.9"

services:

  oracle:
    image: container-registry.oracle.com/database/free:latest
    container_name: ragops_oracle
    environment:
      ORACLE_PWD: ${ORACLE_PASSWORD}
      ORACLE_CHARACTERSET: AL32UTF8
    ports:
      - "1521:1521"
      - "5500:5500"
    volumes:
      - oracle_data:/opt/oracle/oradata
      - ./schema:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "sqlplus", "-L", "sys/${ORACLE_PASSWORD}@//localhost/FREE as sysdba", "@/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: ragops_api
    env_file: .env
    environment:
      ORACLE_HOST: oracle
      ORACLE_PORT: 1521
      AWS_REGION: ${AWS_REGION}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      ORACLE_SERVICE: ${ORACLE_SERVICE:-FREE}
      ORACLE_USER: ${ORACLE_USER:-ragops}
      ORACLE_PASSWORD: ${ORACLE_PASSWORD}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-meta-llama/llama-3.3-70b-instruct:free}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-all-MiniLM-L6-v2}
      FAITHFULNESS_THRESHOLD: ${FAITHFULNESS_THRESHOLD:-0.70}
    ports:
      - "8000:8000"
    depends_on:
      oracle:
        condition: service_healthy
    volumes:
      - ./ingestion:/app/ingestion:ro
      - ./evaluation:/app/evaluation:ro
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    container_name: ragops_frontend
    environment:
      REACT_APP_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy

volumes:
  oracle_data: